<div class="card">
    <img class="cover" [attr.src]="!!book.coverUrl ? book.coverUrl : 'icons/no-cover.png'" [attr.alt]="!!book.coverUrl ? undefined : 'нет обложки'"  />
    <p><b>{{book.title}}</b><span *appIfHighRating="book.rating" style="font-size: 200%; color: yellow; text-shadow: 2px 2px #ff0000;">★</span></p>
    <p>Автор: {{book.author}}</p>
    <p>Год издания: {{book.year}}</p>
    <p>Жанр: {{book.genres | join: ', '}}</p>
    <p>Рейтинг: {{book.rating}}</p>
</div>
